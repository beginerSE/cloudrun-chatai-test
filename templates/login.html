<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - BigQuery AI データ分析エージェント</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="mb-4">
                    <i class="bi bi-database" style="font-size: 3.5rem; color: var(--primary-color);"></i>
                </div>
                <h2>BigQuery AI</h2>
                <p class="text-secondary font-weight-medium">データ分析エージェント</p>
            </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ 'danger' if category == 'error' else 'success' if category == 'success' else 'info' }} alert-dismissible fade show" role="alert">
                            <i class="bi bi-{{ 'exclamation-circle-fill' if category == 'error' else 'check-circle-fill' if category == 'success' else 'info-circle-fill' }} me-2"></i>{{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="POST" action="{{ url_for('login') }}" class="mt-4">
                <div class="mb-4">
                    <label for="username" class="form-label font-weight-semibold">ユーザーネーム</label>
                    <input type="text" class="form-control form-control-lg bg-light border-0" id="username" name="username" placeholder="ユーザーネームを入力" required autofocus autocomplete="username">
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label font-weight-semibold">パスワード</label>
                    <input type="password" class="form-control form-control-lg bg-light border-0" id="password" name="password" placeholder="パスワードを入力" required autocomplete="current-password">
                </div>
                <div class="mb-4 form-check d-flex align-items-center">
                    <input type="checkbox" class="form-check-input mt-0 me-2" id="remember" name="remember" style="width: 1.25rem; height: 1.25rem;">
                    <label class="form-check-label text-secondary" for="remember">
                        ログイン状態を保持
                    </label>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 font-weight-bold" style="font-size: 1.1rem; border-radius: var(--radius-md);">
                    ログイン <i class="bi bi-arrow-right ms-2"></i>
                </button>
            </form>

            <div class="text-center mt-5">
                <p class="text-secondary font-weight-medium">アカウントをお持ちでないですか？ <a href="{{ url_for('signup') }}" class="text-primary text-decoration-none ms-1 font-weight-bold">新規登録</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
