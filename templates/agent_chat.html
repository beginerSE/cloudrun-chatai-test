{% extends "base.html" %}

{% block title %}AIチャット - BigQuery AI データ分析エージェント{% endblock %}

{% block content %}
<div class="row h-100">
    <div class="col-12 d-flex flex-column h-100">
        <div class="config-status mb-3 mt-3 p-3 bg-white rounded border shadow-sm" id="configStatus">
            <div class="d-flex align-items-center text-secondary">
                <div class="spinner-border spinner-border-sm me-3 text-primary" role="status">
                    <span class="visually-hidden">読み込み中...</span>
                </div>
                <span class="font-weight-medium">設定を確認中...</span>
            </div>
        </div>

        <!-- AI Provider Selection -->
        <div class="mb-3 bg-white p-3 rounded border shadow-sm d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center gap-3">
                <label for="aiProviderSelect" class="mb-0 font-weight-semibold text-secondary">
                    <i class="bi bi-robot text-primary me-1"></i>AIプロバイダー
                </label>
                <select class="form-select form-select-sm border-0 bg-light font-weight-medium" id="aiProviderSelect" style="max-width: 220px; box-shadow: none;">
                    <option value="openai">OpenAI (GPT-5)</option>
                    <option value="gemini">Google Gemini</option>
                </select>
            </div>
        </div>

        <div class="chat-container flex-grow-1 d-flex flex-column">
            <div class="chat-messages" id="chatMessages">
                <div class="alert alert-info border-0 shadow-sm">
                    <i class="bi bi-info-circle-fill me-2"></i>こんにちは！BigQueryデータ分析AIアシスタントです。
                    データについて質問してください。
                </div>
            </div>

            <div class="chat-input-container position-relative">
                <div id="inputHistoryPanel" class="input-history-panel d-none">
                    <div class="input-history-header">
                        <span><i class="bi bi-clock-history me-2"></i>入力履歴</span>
                        <button type="button" class="btn-close" id="inputHistoryClose" aria-label="閉じる"></button>
                    </div>
                    <div class="input-history-list" id="inputHistoryList"></div>
                </div>
                <form id="chatForm">
                    <div class="input-group align-items-end gap-2" style="background: transparent;">
                        <button class="btn btn-outline-secondary d-flex align-items-center justify-content-center" type="button" id="historyBtn" title="過去の入力履歴" style="height: 48px; border-radius: var(--radius-md);">
                            <i class="bi bi-clock-history me-1"></i>履歴
                        </button>
                        <textarea class="form-control chat-textarea border bg-white shadow-sm flex-grow-1" id="questionInput" 
                               placeholder="例: 売上トップ10の商品を表示して（Shift+Enterで改行）" 
                               rows="1" required></textarea>
                        <button class="btn btn-primary d-flex align-items-center justify-content-center" type="submit" id="sendBtn" style="height: 48px; border-radius: var(--radius-md);">
                            <i class="bi bi-send-fill me-2"></i>送信
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Pass session_id from Flask to JavaScript
    const CURRENT_SESSION_ID = {{ session_id|tojson }};
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% endblock %}
